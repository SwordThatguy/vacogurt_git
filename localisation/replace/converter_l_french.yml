 dynamic-khitan-culture-num1_ideas_start:0 "Dilie Traditions"
 dynamic-khitan-culture-num1_ideas_bonus:0 "Dilie Ambitions"
 dynamic-tibetan-culture-num2_ideas:0 "Boyül Idées"
 dynamic-tibetan-culture-num2_ideas_start:0 "Boyül Traditions"
